<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:240px;overflow:hidden;font-family:var(--brz-font-sans);}
  .wrap{display:flex;gap:20px;align-items:stretch;height:100%;}
  .shot{flex:1;background:#F7F7F7;border:1px solid #EDEDED;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;}
  .bottle{width:82px;height:160px;background:#000;border-radius:6px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;box-shadow:0 26px 40px -20px rgba(0,0,0,0.4);}
  .bottle .lab{background:#fff;border-radius:2px;padding:8px 6px;width:100%;text-align:center;}
  .bottle .wm{font-family:var(--brz-font-display);font-size:10px;letter-spacing:0.25em;color:#000;}
  .bottle .sub{font-family:ui-monospace,Menlo,monospace;font-size:7px;color:#555;margin-top:3px;letter-spacing:0.05em;}
  .tag{position:absolute;top:14px;left:14px;font-size:9px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;background:#000;color:#fff;padding:4px 10px;border-radius:2px;}
  .info{flex:1.15;display:flex;flex-direction:column;justify-content:center;gap:4px;border-left:1px solid #EDEDED;padding-left:20px;}
  .eye{font-size:10px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:#555;}
  .name{font-family:var(--brz-font-display);font-weight:500;font-size:24px;color:#000;line-height:1.1;letter-spacing:-0.01em;margin:2px 0;}
  .sub{font-family:var(--brz-font-serif);font-style:italic;font-size:15px;color:#555;}
  .meta{display:flex;align-items:baseline;gap:12px;margin-top:8px;}
  .price{font-weight:700;font-size:17px;color:#000;letter-spacing:-0.01em;}
  .stars{font-size:13px;color:#000;letter-spacing:0.15em;}
  .rc{font-size:11px;color:#888;letter-spacing:0.02em;}
  .cta{margin-top:12px;display:inline-flex;align-items:center;gap:8px;background:#000;color:#fff;padding:10px 20px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;width:fit-content;}
  .row-stats{display:flex;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid #EDEDED;}
  .stat{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555;font-weight:600;}
</style></head><body>
<div class="wrap">
  <div class="shot">
    <div class="tag">Best Seller</div>
    <div class="bottle">
      <div class="lab">
        <div class="wm">BRIZION</div>
        <div class="sub">4% PEPTIDE · 30ML</div>
      </div>
    </div>
  </div>
  <div class="info">
    <div class="eye">Serum · 01</div>
    <div class="name">Firm &amp; Lift Serum</div>
    <div class="sub">Visibly firms the look of skin in 8 weeks.</div>
    <div class="meta">
      <span class="price">$39.99</span>
      <span class="stars">★★★★★</span>
      <span class="rc">1,240 reviews</span>
    </div>
    <div class="cta">Add to cart →</div>
    <div class="row-stats">
      <span class="stat">Clinically proven</span>
      <span class="stat">· Derm tested</span>
      <span class="stat">· Fragrance-free</span>
    </div>
  </div>
</div>
</body></html>
