<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:130px;overflow:hidden;font-family:var(--brz-font-sans);}
  .label{font-size:11px;color:#6B6B6B;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
  .row{display:flex;gap:0;align-items:stretch;border:1px solid #E5E5E5;border-radius:2px;overflow:hidden;}
  .sw{flex:1;height:64px;display:flex;align-items:flex-end;padding:6px 8px;box-sizing:border-box;}
  .sw small{font-family:ui-monospace,Menlo,monospace;font-size:9px;background:rgba(255,255,255,0.92);color:#000;padding:1px 4px;border-radius:1px;}
  .sw.dark small{background:rgba(0,0,0,0.75);color:#fff;}
</style></head><body>
<div class="label">Brand — Ink &amp; Paper</div>
<div class="row">
  <div class="sw" style="background:#FFFFFF;"><small>#FFFFFF · Paper</small></div>
  <div class="sw" style="background:#FAFAFA;"><small>#FAFAFA · n-50</small></div>
  <div class="sw" style="background:#F2F2F2;"><small>#F2F2F2 · n-100</small></div>
  <div class="sw dark" style="background:#000000;"><small>#000000 · Ink</small></div>
</div>
</body></html>
