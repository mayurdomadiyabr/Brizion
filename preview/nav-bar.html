<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:130px;overflow:hidden;font-family:var(--brz-font-sans);}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(255,255,255,0.88);backdrop-filter:blur(10px);border:1px solid #E5E5E5;border-radius:0;}
  .nav a{font-size:12px;color:#000;text-decoration:none;letter-spacing:0.02em;}
  .nav .left{display:flex;gap:22px;align-items:center;}
  .nav .right{display:flex;gap:16px;align-items:center;}
  .wm{font-family:var(--brz-font-display);font-size:20px;font-weight:600;letter-spacing:0.22em;color:#000;}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#9A9A9A;margin-top:10px;letter-spacing:0.04em;}
  .pill{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#fff;background:#000;padding:3px 8px;border-radius:999px;}
</style></head><body>
<div class="nav">
  <div class="left">
    <a>Shop</a><a>Science</a><a>Reviews</a><a>Journal</a>
  </div>
  <div class="wm">BRIZION</div>
  <div class="right">
    <a>Search</a><a>Account</a><span class="pill">Cart 0</span>
  </div>
</div>
<div class="meta">Sticky nav · white + 88% + backdrop-blur(10) · 1px hairline border</div>
</body></html>
