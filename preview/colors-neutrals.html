<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:150px;overflow:hidden;font-family:var(--brz-font-sans);}
  .label{font-size:11px;color:#6B6B6B;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
  .row{display:flex;gap:0;align-items:stretch;border:1px solid #E5E5E5;border-radius:2px;overflow:hidden;}
  .sw{flex:1;height:86px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;box-sizing:border-box;}
  .sw small{font-family:ui-monospace,Menlo,monospace;font-size:9px;background:rgba(255,255,255,0.92);color:#000;padding:1px 4px;border-radius:1px;align-self:flex-start;}
  .sw.dark small{background:rgba(0,0,0,0.75);color:#fff;}
  .tok{font-family:ui-monospace,Menlo,monospace;font-size:8.5px;color:rgba(0,0,0,0.55);margin-top:3px;letter-spacing:0.02em;align-self:flex-start;}
  .sw.dark .tok{color:rgba(255,255,255,0.55);}
</style></head><body>
<div class="label">Monochrome scale — dermatologist-grade</div>
<div class="row">
  <div class="sw" style="background:#FFFFFF;"><small>#FFFFFF</small><span class="tok">n-0</span></div>
  <div class="sw" style="background:#FAFAFA;"><small>#FAFAFA</small><span class="tok">n-50</span></div>
  <div class="sw" style="background:#F2F2F2;"><small>#F2F2F2</small><span class="tok">n-100</span></div>
  <div class="sw" style="background:#E5E5E5;"><small>#E5E5E5</small><span class="tok">n-200</span></div>
  <div class="sw" style="background:#D4D4D4;"><small>#D4D4D4</small><span class="tok">n-300</span></div>
  <div class="sw" style="background:#9A9A9A;"><small>#9A9A9A</small><span class="tok">n-400</span></div>
  <div class="sw dark" style="background:#6B6B6B;"><small>#6B6B6B</small><span class="tok">n-500</span></div>
  <div class="sw dark" style="background:#4A4A4A;"><small>#4A4A4A</small><span class="tok">n-600</span></div>
  <div class="sw dark" style="background:#2A2A2A;"><small>#2A2A2A</small><span class="tok">n-700</span></div>
  <div class="sw dark" style="background:#000000;"><small>#000000</small><span class="tok">n-900</span></div>
</div>
</body></html>
