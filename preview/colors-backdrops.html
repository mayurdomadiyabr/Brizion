<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:170px;overflow:hidden;font-family:var(--brz-font-sans);}
  .label{font-size:11px;color:#6B6B6B;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .sw{aspect-ratio:1;border-radius:2px;border:1px solid rgba(0,0,0,0.06);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;}
  .sw small{font-family:ui-monospace,Menlo,monospace;font-size:8.5px;color:#000;background:rgba(255,255,255,0.92);padding:1px 4px;border-radius:1px;letter-spacing:0.02em;}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;color:#9A9A9A;margin-top:10px;letter-spacing:0.04em;}
</style></head><body>
<div class="label">Backdrop tones — section washes</div>
<div class="grid">
  <div class="sw" style="background:#FFFFFF;"><small>Paper</small></div>
  <div class="sw" style="background:#FAFAFA;"><small>n-50</small></div>
  <div class="sw" style="background:#F2F2F2;"><small>n-100</small></div>
  <div class="sw" style="background:#E5E5E5;"><small>n-200</small></div>
  <div class="sw" style="background:#000000;"><small style="background:rgba(0,0,0,0.7);color:#fff;">Ink</small></div>
</div>
<div class="meta">Solid washes only. Never gradients. Alternate paper / n-50 / n-100 / ink to pace the page.</div>
</body></html>
