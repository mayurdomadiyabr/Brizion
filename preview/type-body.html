<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brz-bg-page);}
  body{padding:20px;box-sizing:border-box;height:160px;overflow:hidden;}
  .row{display:flex;align-items:center;gap:16px;}
  .sw{width:56px;height:56px;border-radius:12px;border:1px solid var(--brz-border-hair);display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;}
  .sw small{font-family:var(--brz-font-mono);font-size:9px;color:var(--brz-n-600);background:rgba(255,255,255,0.85);padding:1px 4px;border-radius:3px;}
  .label{font-family:var(--brz-font-sans);font-size:11px;color:var(--brz-fg-3);letter-spacing:0.1em;text-transform:uppercase;margin-top:6px;}
  .meta{font-family:var(--brz-font-mono);font-size:10px;color:var(--brz-fg-3);}
  
</style></head><body>
<div style="font-family:var(--brz-font-serif);font-size:22px;line-height:1.4;color:var(--brz-ink);font-weight:400;margin-bottom:10px;">
  Lead paragraph — Cormorant Garamond softens long-form copy.
</div>
<div style="font-family:var(--brz-font-sans);font-size:14px;line-height:1.6;color:var(--brz-fg-2);">
