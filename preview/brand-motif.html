<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:180px;overflow:hidden;font-family:var(--brz-font-sans);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .tile{aspect-ratio:1;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;border:1px solid rgba(0,0,0,0.06);}
  .tile small{font-family:ui-monospace,Menlo,monospace;font-size:8.5px;background:rgba(255,255,255,0.92);padding:1px 4px;border-radius:1px;color:#000;}
  .tile.dark small{background:rgba(0,0,0,0.7);color:#fff;}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#9A9A9A;margin-top:10px;letter-spacing:0.04em;}
</style></head><body>
<div class="grid">
  <div class="tile" style="background:#FFFFFF;"><small>Paper</small></div>
  <div class="tile" style="background:#FAFAFA;"><small>n-50</small></div>
  <div class="tile" style="background:#F2F2F2;"><small>n-100</small></div>
  <div class="tile" style="background:#E5E5E5;"><small>n-200</small></div>
  <div class="tile dark" style="background:#000000;"><small>Ink</small></div>
</div>
<div class="meta">Section backdrops — solid monochrome washes, never gradients, never pastel</div>
</body></html>
