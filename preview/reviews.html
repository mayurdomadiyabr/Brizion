<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:150px;overflow:hidden;font-family:var(--brz-font-sans);}
  .row{display:flex;gap:16px;align-items:center;border:1px solid #E5E5E5;padding:16px;}
  .av{width:56px;height:56px;border-radius:50%;background:#F2F2F2;border:1px solid #E5E5E5;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--brz-font-display);font-size:22px;color:#000;font-weight:600;}
  .stars{letter-spacing:0.15em;font-size:13px;color:#000;}
  .q{font-family:var(--brz-font-serif);font-style:italic;font-weight:500;font-size:17px;color:#000;line-height:1.35;margin-top:4px;}
  .cite{font-size:10px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#6B6B6B;margin-top:8px;}
</style></head><body>
<div class="row">
  <div class="av">R</div>
  <div style="flex:1;">
    <div class="stars">★★★★★</div>
    <div class="q">"Real results. My skin feels smoother and bouncier within weeks."</div>
    <div class="cite">Re'gan — Verified Buyer</div>
  </div>
</div>
</body></html>
