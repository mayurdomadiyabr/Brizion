<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:140px;overflow:hidden;font-family:var(--brz-font-sans);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .b{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;padding:5px 12px;border-radius:999px;letter-spacing:0.18em;text-transform:uppercase;}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#9A9A9A;margin-top:10px;letter-spacing:0.04em;}
</style></head><body>
<div class="row">
  <span class="b" style="background:#000;color:#fff;">Best Seller</span>
  <span class="b" style="background:#fff;color:#000;border:1px solid #000;">New</span>
  <span class="b" style="background:#F2F2F2;color:#000;">Clinically Tested</span>
  <span class="b" style="background:#fff;color:#000;border:1px solid #E5E5E5;">Fragrance Free</span>
  <span class="b" style="background:#2A2A2A;color:#fff;">Derm Approved</span>
  <span class="b" style="background:#E5E5E5;color:#000;">Limited</span>
</div>
<div class="meta">Badges — ink-on-paper only. No colored pill backgrounds.</div>
</body></html>
