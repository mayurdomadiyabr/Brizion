<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:130px;overflow:hidden;font-family:var(--brz-font-sans);}
  .label{font-size:11px;color:#6B6B6B;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid #E5E5E5;border-radius:2px;}
  .dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);}
  .k{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#000;}
  .v{font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#6B6B6B;}
</style></head><body>
<div class="label">Semantic — status tokens (no hue, weight by value)</div>
<div class="grid">
  <div class="item"><div class="dot" style="background:#2A2A2A;"></div><div><div class="k">Success</div><div class="v">n-700</div></div></div>
  <div class="item"><div class="dot" style="background:#000000;"></div><div><div class="k">Danger</div><div class="v">ink</div></div></div>
  <div class="item"><div class="dot" style="background:#4A4A4A;"></div><div><div class="k">Info</div><div class="v">n-600</div></div></div>
  <div class="item"><div class="dot" style="background:#6B6B6B;"></div><div><div class="k">Warn</div><div class="v">n-500</div></div></div>
</div>
</body></html>
