<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}

  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sq{background:#000;}
  .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6B6B6B;}
</style></head><body>
<div class="row">

  <div class="item"><div class="sq" style="width:12px;height:12px;"></div><div class="lbl">12</div></div>
  <div class="item"><div class="sq" style="width:16px;height:16px;"></div><div class="lbl">16</div></div>
  <div class="item"><div class="sq" style="width:20px;height:20px;"></div><div class="lbl">20</div></div>
  <div class="item"><div class="sq" style="width:24px;height:24px;"></div><div class="lbl">24</div></div>
  <div class="item"><div class="sq" style="width:32px;height:32px;"></div><div class="lbl">32</div></div>
  <div class="item"><div class="sq" style="width:40px;height:40px;"></div><div class="lbl">40</div></div>
  <div class="item"><div class="sq" style="width:48px;height:48px;"></div><div class="lbl">48</div></div>
  <div class="item"><div class="sq" style="width:64px;height:64px;"></div><div class="lbl">64</div></div>
</div>
</body></html>
