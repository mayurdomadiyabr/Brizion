<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;box-sizing:border-box;height:130px;overflow:hidden;font-family:var(--brz-font-sans);}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sq{background:#000;}
  .lbl{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6B6B6B;}
</style></head><body>
<div class="row">
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:0px;"></div><div class="lbl">none · 0</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:2px;"></div><div class="lbl">xs · 2</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:4px;"></div><div class="lbl">sm · 4</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:6px;"></div><div class="lbl">md · 6</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:10px;"></div><div class="lbl">lg · 10</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:16px;"></div><div class="lbl">xl · 16</div></div>
  <div class="item"><div class="sq" style="width:56px;height:56px;border-radius:999px;"></div><div class="lbl">pill</div></div>
</div>
</body></html>
